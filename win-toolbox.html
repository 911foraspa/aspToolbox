<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WIN//HACK — Windows Toolbox</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #050510;
  --surface: #08081a;
  --card: #0c0c20;
  --border: #1a1a3a;
  --border2: #252550;
  --blue: #00aaff;
  --blue2: #0055cc;
  --cyan: #00ffff;
  --win: #0078d4;
  --win2: #50e3ff;
  --red: #ff3355;
  --yellow: #ffcc00;
  --green: #00ff88;
  --muted: #333366;
  --text: #c0c8e8;
  --glow: rgba(0,170,255,0.12);
  --glow2: rgba(0,170,255,0.06);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Share Tech Mono', monospace;
  min-height: 100vh;
  overflow-x: hidden;
  cursor: default;
}

/* Animated grid */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(0,170,255,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,170,255,0.04) 1px, transparent 1px);
  background-size: 50px 50px;
  pointer-events: none;
  z-index: 0;
  animation: gridShift 20s linear infinite;
}

@keyframes gridShift {
  from { background-position: 0 0; }
  to { background-position: 50px 50px; }
}

/* Scanlines */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.03) 3px, rgba(0,0,0,0.03) 4px);
  pointer-events: none;
  z-index: 9999;
}

.app { position: relative; z-index: 10; max-width: 1200px; margin: 0 auto; padding: 0 28px 80px; }

/* ── HEADER ── */
.header {
  padding: 28px 0 24px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 28px;
  position: relative;
}

.win-logo {
  display: flex;
  align-items: center;
  gap: 18px;
  margin-bottom: 8px;
}

.win-flag {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 3px;
  width: 36px;
  height: 36px;
}

.win-flag-sq {
  border-radius: 2px;
  animation: winFlagPulse 3s ease-in-out infinite;
}

.win-flag-sq:nth-child(1) { background: var(--win); }
.win-flag-sq:nth-child(2) { background: var(--win); animation-delay: 0.2s; }
.win-flag-sq:nth-child(3) { background: var(--win); animation-delay: 0.4s; }
.win-flag-sq:nth-child(4) { background: var(--win); animation-delay: 0.6s; }

@keyframes winFlagPulse {
  0%,100% { opacity: 0.7; }
  50% { opacity: 1; box-shadow: 0 0 8px var(--win); }
}

.logo-text {
  font-family: 'Orbitron', monospace;
  font-size: 26px;
  font-weight: 900;
  color: var(--blue);
  text-shadow: 0 0 30px rgba(0,170,255,0.5);
  letter-spacing: 2px;
}

.logo-text span { color: var(--win2); }

.header-sub {
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 3px;
  text-transform: uppercase;
  margin-top: 4px;
}

.header-meta {
  position: absolute;
  right: 0; top: 28px;
  display: flex;
  gap: 20px;
  flex-wrap: wrap;
}

.meta-item { text-align: right; }
.meta-val { font-family: 'Orbitron', monospace; font-size: 14px; font-weight: 700; color: var(--blue); }
.meta-label { font-size: 9px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; }

/* ── FILTERS ── */
.filters {
  display: flex;
  gap: 6px;
  margin-bottom: 24px;
  flex-wrap: wrap;
  align-items: center;
}

.f-label { font-size: 10px; color: var(--muted); letter-spacing: 2px; margin-right: 4px; }

.f-btn {
  background: transparent;
  border: 1px solid var(--border2);
  border-radius: 3px;
  color: var(--muted);
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px;
  letter-spacing: 1px;
  text-transform: uppercase;
  padding: 5px 12px;
  cursor: pointer;
  transition: all 0.2s;
}

.f-btn:hover { color: var(--blue); border-color: var(--blue); }
.f-btn.active { color: var(--win2); border-color: var(--win2); background: rgba(0,170,255,0.08); }

.f-search {
  margin-left: auto;
  background: var(--card);
  border: 1px solid var(--border2);
  border-radius: 3px;
  padding: 5px 12px;
  color: var(--text);
  font-family: 'Share Tech Mono', monospace;
  font-size: 11px;
  width: 180px;
  outline: none;
  transition: border-color 0.2s;
}

.f-search:focus { border-color: var(--blue); }
.f-search::placeholder { color: var(--muted); }

/* ── SECTION HEADER ── */
.sec-hdr {
  display: flex;
  align-items: center;
  gap: 12px;
  margin: 28px 0 12px;
}

.sec-hdr-line { flex: 1; height: 1px; background: var(--border); }
.sec-hdr-text { font-family: 'Orbitron', monospace; font-size: 11px; letter-spacing: 3px; color: var(--muted); text-transform: uppercase; white-space: nowrap; }
.sec-hdr-count { font-size: 9px; padding: 2px 7px; border-radius: 2px; color: var(--blue); border: 1px solid var(--blue2); }

/* ── TOOLS GRID ── */
.tools-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 2px; }

/* ── TOOL CARD ── */
.tool-card {
  background: var(--card);
  border: 1px solid var(--border);
  position: relative;
  overflow: hidden;
  cursor: pointer;
  transition: all 0.2s;
}

.tool-card::after {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: var(--cc, var(--blue));
  transform: scaleX(0);
  transform-origin: left;
  transition: transform 0.3s;
}

.tool-card:hover::after, .tool-card.expanded::after { transform: scaleX(1); }
.tool-card:hover, .tool-card.expanded { background: var(--surface); border-color: var(--border2); }
.tool-card.hidden { display: none; }

.tc-head {
  padding: 14px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
}

.tc-icon {
  width: 34px; height: 34px;
  border-radius: 4px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
  border: 1px solid var(--border2);
  background: rgba(0,170,255,0.06);
  flex-shrink: 0;
}

.tc-info { flex: 1; min-width: 0; }
.tc-name { font-family: 'Orbitron', monospace; font-size: 12px; font-weight: 700; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.tc-tag { font-size: 10px; color: var(--muted); margin-top: 2px; }

.tc-badges { display: flex; gap: 5px; flex-shrink: 0; }

.badge {
  font-size: 8px; letter-spacing: 1px; text-transform: uppercase;
  padding: 2px 5px; border-radius: 2px; border: 1px solid;
}

.b-cat { color: var(--cc, var(--blue)); border-color: var(--cc, var(--blue)); background: rgba(0,0,0,0.3); }
.b-free { color: var(--green); border-color: var(--green); background: rgba(0,255,136,0.06); }
.b-paid { color: var(--yellow); border-color: var(--yellow); background: rgba(255,204,0,0.06); }
.b-risk-l { color: var(--green); border-color: var(--green); background: rgba(0,255,136,0.06); }
.b-risk-m { color: var(--yellow); border-color: var(--yellow); background: rgba(255,204,0,0.06); }
.b-risk-h { color: var(--red); border-color: var(--red); background: rgba(255,51,85,0.06); }

.tc-arrow { color: var(--muted); font-size: 10px; transition: transform 0.3s; flex-shrink: 0; }
.tool-card.expanded .tc-arrow { transform: rotate(180deg); color: var(--win2); }

/* ── CARD BODY ── */
.tc-body { display: none; padding: 0 16px 16px; border-top: 1px solid var(--border); }
.tool-card.expanded .tc-body { display: block; }

.tc-desc { font-size: 11px; color: var(--muted); line-height: 1.7; margin: 12px 0 14px; }

/* PS/CMD blocks */
.cmd-block {
  background: var(--bg);
  border: 1px solid var(--border2);
  border-radius: 4px;
  margin-bottom: 8px;
  overflow: hidden;
}

.cmd-hdr {
  display: flex; justify-content: space-between; align-items: center;
  padding: 5px 10px;
  border-bottom: 1px solid var(--border);
  background: rgba(0,0,0,0.3);
}

.cmd-hdr-left { display: flex; align-items: center; gap: 8px; }
.cmd-hdr-dot { width: 8px; height: 8px; border-radius: 50%; }
.cmd-hdr-dot.r { background: #ff5f56; }
.cmd-hdr-dot.y { background: #ffbd2e; }
.cmd-hdr-dot.g { background: #27c93f; }
.cmd-type { font-size: 8px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; }

.copy-btn {
  background: transparent; border: none;
  color: var(--muted); font-family: 'Share Tech Mono', monospace;
  font-size: 9px; cursor: pointer; padding: 2px 6px;
  border-radius: 2px; transition: all 0.2s; letter-spacing: 1px;
}
.copy-btn:hover { color: var(--win2); background: rgba(0,170,255,0.08); }
.copy-btn.ok { color: var(--green); }

.cmd-body {
  padding: 10px 12px;
  font-size: 11px;
  line-height: 1.6;
}

.ps-prompt { color: var(--blue2); }
.ps-cmd { color: var(--win2); }
.cmd-prompt { color: #888; }
.cmd-txt { color: var(--yellow); }

/* Download section */
.dl-section {
  background: rgba(0,120,212,0.08);
  border: 1px solid rgba(0,120,212,0.25);
  border-radius: 4px;
  padding: 12px 14px;
  margin: 10px 0;
}

.dl-title { font-size: 9px; color: var(--win); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 8px; }

.dl-link {
  display: flex; align-items: center; gap: 8px;
  font-size: 11px; color: var(--blue);
  text-decoration: none;
  padding: 4px 0;
  transition: color 0.2s;
  border-bottom: 1px solid transparent;
}

.dl-link:hover { color: var(--win2); }
.dl-link-icon { font-size: 12px; }

/* Usage */
.usage-grid { display: grid; grid-template-columns: 1fr; gap: 5px; margin-top: 10px; }

.usage-item {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 7px 10px;
}

.usage-label { font-size: 9px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 3px; }
.usage-cmd { font-size: 10px; color: var(--cyan); word-break: break-all; }

/* ── BOTTOM BAR ── */
.bottom-bar {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: rgba(5,5,16,0.95);
  border-top: 1px solid var(--border);
  backdrop-filter: blur(10px);
  padding: 10px 32px;
  display: flex; gap: 20px; align-items: center;
  z-index: 100;
  font-size: 10px;
}

.bb-stat { color: var(--muted); display: flex; gap: 6px; }
.bb-stat span { color: var(--blue); }
.bb-warn { color: var(--red); font-size: 9px; margin-left: auto; }

/* ── ANIMATIONS ── */
@keyframes cardIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
.tool-card { animation: cardIn 0.3s ease backwards; }
</style>
</head>

let curfilt = 'all', cursearch = '';

function build() {
  const cont = document.getElementById('container');
  cont.innerHTML = '';

  const catOrder = ['network','osint','password','pentest','web','forensics','recon'];

  catOrder.forEach((cat, ci) => {
    const catTools = TOOLS.filter(t => t.cat === cat);
    if (!catTools.length) return;
    const info = CATS[cat];

    const sh = document.createElement('div');
    sh.className = 'sec-hdr';
    sh.innerHTML = `
      <div class="sec-hdr-line"></div>
      <span class="sec-hdr-text" style="color:${info.color}">${info.icon} ${info.label}</span>
      <span class="sec-hdr-count" style="color:${info.color}; border-color:${info.color}">${catTools.length}</span>
      <div class="sec-hdr-line"></div>
    `;
    sh.id = 'sec-' + cat;
    cont.appendChild(sh);

    const grid = document.createElement('div');
    grid.className = 'tools-grid';
    grid.id = 'grid-' + cat;

    catTools.forEach((t, ti) => {
      const riskCls = { low:'b-risk-l', med:'b-risk-m', high:'b-risk-h' }[t.risk];
      const riskLbl = { low:'LOW', med:'MED', high:'HIGH' }[t.risk];
      const priceCls = t.price === 'free' ? 'b-free' : 'b-paid';

      const installHtml = t.install.map(inst => {
        const pClr = inst.type === 'winget' ? '#0078d4' : inst.type === 'cmd' ? '#888' : '#555';
        const cClr = inst.type === 'winget' ? '#50e3ff' : inst.type === 'cmd' ? '#ffd700' : '#aaa';
        const safeCmd = inst.cmd.replace(/'/g, "&#39;");
        return `
          <div class="cmd-block">
            <div class="cmd-hdr">
              <div class="cmd-hdr-left">
                <div class="cmd-hdr-dot r"></div>
                <div class="cmd-hdr-dot y"></div>
                <div class="cmd-hdr-dot g"></div>
                <span class="cmd-type">${inst.type === 'winget' ? 'PowerShell' : inst.type === 'manual' ? 'Manual' : 'CMD'}</span>
              </div>
              <button class="copy-btn" onclick="copyTxt(this, '${safeCmd}')">Copy</button>
            </div>
            <div class="cmd-body">
              <span style="color:${pClr}">${inst.prompt} </span><span style="color:${cClr}">${inst.cmd}</span>
            </div>
          </div>
        `;
      }).join('');

      const dlHtml = t.dl.map(d => `
        <a class="dl-link" href="${d.url}" target="_blank">
          <span class="dl-link-icon">⬇</span>${d.label}
        </a>
      `).join('');

      const usageHtml = t.usage.map(u => `
        <div class="usage-item">
          <div class="usage-label">${u.label}</div>
          <div class="usage-cmd">${u.cmd}</div>
        </div>
      `).join('');

      const card = document.createElement('div');
      card.className = 'tool-card';
      card.id = 'tc-' + t.id;
      card.dataset.cat = t.cat;
      card.dataset.name = t.name.toLowerCase();
      card.style.setProperty('--cc', info.color);
      card.style.animationDelay = (ci * 0.08 + ti * 0.04) + 's';
      card.innerHTML = `
        <div class="tc-head" onclick="toggle('${t.id}')">
          <div class="tc-icon">${t.icon}</div>
          <div class="tc-info">
            <div class="tc-name">${t.name}</div>
            <div class="tc-tag">${t.tag}</div>
          </div>
          <div class="tc-badges">
            <span class="badge b-cat" style="color:${info.color}; border-color:${info.color}66">${cat.toUpperCase()}</span>
            <span class="badge ${priceCls}">${t.price.toUpperCase()}</span>
            <span class="badge ${riskCls}">RISK:${riskLbl}</span>
          </div>
          <span class="tc-arrow">▼</span>
        </div>
        <div class="tc-body">
          <div class="tc-desc">${t.desc}</div>
          ${installHtml}
          <div class="dl-section">
            <div class="dl-title">⬇ Download Links</div>
            ${dlHtml}
          </div>
          <div style="font-size:9px; letter-spacing:2px; color:var(--muted); text-transform:uppercase; margin-top:10px; margin-bottom:6px;">Usage Examples</div>
          <div class="usage-grid">${usageHtml}</div>
        </div>
      `;
      grid.appendChild(card);
    });
    cont.appendChild(grid);
  });

  document.getElementById('tool-count').textContent = TOOLS.length;
  document.getElementById('shown').textContent = TOOLS.length;
}

function toggle(id) {
  document.getElementById('tc-' + id)?.classList.toggle('expanded');
}

function filt(cat) {
  curfilt = cat;
  document.querySelectorAll('.f-btn').forEach(b => b.classList.toggle('active', b.dataset.f === cat));
  apply();
}

function search(q) { cursearch = q.toLowerCase(); apply(); }

function apply() {
  let n = 0;
  TOOLS.forEach(t => {
    const el = document.getElementById('tc-' + t.id);
    if (!el) return;
    const ok = (curfilt === 'all' || t.cat === curfilt) &&
               (!cursearch || t.name.toLowerCase().includes(cursearch) || t.tag.toLowerCase().includes(cursearch));
    el.classList.toggle('hidden', !ok);
    if (ok) n++;
  });
  document.getElementById('shown').textContent = n;

  Object.keys(CATS).forEach(cat => {
    const sec = document.getElementById('sec-' + cat);
    const grid = document.getElementById('grid-' + cat);
    if (!sec || !grid) return;
    const vis = grid.querySelector('.tool-card:not(.hidden)');
    sec.style.display = vis ? '' : 'none';
    grid.style.display = vis ? '' : 'none';
  });
}

function copyTxt(btn, txt) {
  navigator.clipboard.writeText(txt).then(() => {
    btn.textContent = '✓ OK';
    btn.classList.add('ok');
    setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('ok'); }, 2000);
  });
}

build();
</script>
